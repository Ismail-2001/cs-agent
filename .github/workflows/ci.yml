name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          TENANT_NAME: test
        run: |
          python -m pytest tests/ -v --tb=short

      # Evals make REAL LLM calls, so they only run when an API key is
      # configured as a repo secret. Without it they skip (not fail) so the
      # build stays green in forked/secret-less environments.
      - name: Run evals (if API key present)
        env:
          TENANT_NAME: test
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "OPENROUTER_API_KEY not set — skipping evals (requires real LLM calls)"
            exit 0
          fi
          python -m evals.run_evals
